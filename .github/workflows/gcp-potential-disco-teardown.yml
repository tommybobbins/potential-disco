name: gcp-potential-disco-teardown

on:
  workflow_dispatch:

env:
  WORKING_DIR: infrastructure 
  TF_VAR_project:  ${{ vars.TFVAR_GCP_PROJECT }}

jobs:
  setup:
    runs-on: ubuntu-latest
    environment: "PRD"
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
      with:
        create_credentials_file: 'true'
        workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

    - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb

    - name: OpenTofu Init
      id: init
      run: |
        echo "TFVAR_project: $TF_VAR_project"
        tofu init
      env:
         TF_VAR_project: ${{ vars.TFVAR_GCP_PROJECT }}

    - uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395
      if: always()
      continue-on-error: true
      with:
        cluster_name: "${{ vars.TFVAR_GCP_PROJECT }}-gke"
        location: ${{ vars.REGION }}
        project_id: ${{ vars.TFVAR_GCP_PROJECT }}

    - name: OpenTofu Destroy
      id: destroy
      run: tofu destroy -auto-approve
      continue-on-error: true
      env:
         TF_VAR_project: ${{ vars.TFVAR_GCP_PROJECT }}
